version: "3.8"

services:
  accounts:
    image: "amansinghkandwal/accounts:v1"
    container_name: accounts-ms
    ports:
      - "8080:8080"
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - designXBank

  loans:
    image: "amansinghkandwal/loans:v1"
    container_name: loans-ms
    ports:
      - "8090:8090"
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - designXBank

  cards:
    image: "amansinghkandwal/cards:v1"
    container_name: cards-ms
    ports:
      - "9000:9000"
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - designXBank

networks:
  designXBank:
    driver: bridge